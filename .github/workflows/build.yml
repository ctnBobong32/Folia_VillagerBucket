name: Folia_VillagerBucket构建

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: 使用 Maven 打包（多线程 + 跳过测试）
        run: |
          mvn -B clean package \
            -Dmaven.test.skip=true \
            -T 8C \
            -Dmaven.compiler.fork=true

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: VillagerBucket
          path: target/*.jar
          if-no-files-found: error